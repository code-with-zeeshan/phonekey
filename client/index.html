<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>PhoneKey</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1c1f2e;
      --surface2:   #252840;
      --accent:     #6c63ff;
      --accent-dim: #4a44b3;
      --success:    #2ecc71;
      --warning:    #f39c12;
      --danger:     #e74c3c;
      --text:       #e8eaf6;
      --text-dim:   #9e9eb8;
      --border:     #2e3153;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: 16px 16px 24px;
      gap: 14px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    /* ── Connection Status Badge ── */
    #status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--surface2);
      transition: background 0.3s;
      user-select: none;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
      transition: background 0.3s;
    }

    #status-badge.connected #status-dot   { background: var(--success); }
    #status-badge.connecting #status-dot  { background: var(--warning); animation: pulse 1s infinite; }
    #status-badge.disconnected #status-dot{ background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Typing Area ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* Hidden sentinel textarea — captures native keyboard */
    #sentinel-input {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Tap-to-type activation button */
    #tap-to-type {
      width: 100%;
      padding: 18px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 2px dashed var(--border);
      color: var(--text-dim);
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    #tap-to-type.active {
      border-color: var(--accent);
      background: var(--surface2);
      color: var(--text);
    }

    /* Live display of what's being typed */
    #live-display {
      min-height: 54px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 1.1rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #live-display:empty::before {
      content: "Live preview…";
      color: var(--text-dim);
      font-style: italic;
    }

    #live-display.flash {
      border-color: var(--accent);
    }

    /* ── Quick Actions ── */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .quick-btn {
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
      active: none;
    }

    .quick-btn:active {
      transform: scale(0.94);
      background: var(--surface2);
      border-color: var(--accent);
    }

    .quick-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }

    /* ── Modifier Keys (toggle state) ── */
    .mod-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .mod-btn {
      padding: 13px 8px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .mod-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Function Key Row ── */
    .fn-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .fn-row::-webkit-scrollbar { display: none; }

    .fn-btn {
      flex: 0 0 auto;
      min-width: 44px;
      padding: 10px 6px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      outline: none;
      user-select: none;
    }

    .fn-btn:active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Clear button ── */
    #clear-display {
      align-self: flex-end;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.78rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    #clear-display:hover { color: var(--danger); }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
  </style>
</head>

<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">Phone<span>Key</span></div>
    <div id="status-badge" class="connecting">
      <div id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <!-- Tap to Type -->
  <div>
    <div class="section-label">Typing</div>
    <button id="tap-to-type" onclick="activateSentinel()">
      👆 Tap here to start typing
    </button>
    <!-- Hidden sentinel textarea (the actual key capture mechanism) -->
    <textarea
      id="sentinel-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-hidden="true"
      tabindex="-1"
    ></textarea>
  </div>

  <!-- Live Preview -->
  <div>
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div class="section-label">Live Preview</div>
      <button id="clear-display" onclick="clearDisplay()">✕ Clear</button>
    </div>
    <div id="live-display"></div>
  </div>

  <!-- Quick Action Keys -->
  <div>
    <div class="section-label">Quick Keys</div>
    <div class="quick-grid">
      <button class="quick-btn" onclick="sendSpecial('Enter')">
        <span class="icon">↵</span>Enter
      </button>
      <button class="quick-btn" onclick="sendSpecial('Tab')">
        <span class="icon">⇥</span>Tab
      </button>
      <button class="quick-btn" onclick="sendSpecial('Backspace')">
        <span class="icon">⌫</span>Backspace
      </button>
      <button class="quick-btn" onclick="sendSpecial('Escape')">
        <span class="icon">⎋</span>Escape
      </button>
      <button class="quick-btn" onclick="sendSpecial('Delete')">
        <span class="icon">⌦</span>Delete
      </button>
      <button class="quick-btn" onclick="sendSpecial('CapsLock')">
        <span class="icon">⇪</span>CapsLock
      </button>
      <button class="quick-btn" onclick="sendSpecial('ArrowUp')">
        <span class="icon">↑</span>Up
      </button>
      <button class="quick-btn" onclick="sendSpecial('ArrowDown')">
        <span class="icon">↓</span>Down
      </button>
      <button class="quick-btn" onclick="sendSpecial('ArrowLeft')">
        <span class="icon">←</span>Left
      </button>
      <button class="quick-btn" onclick="sendSpecial('ArrowRight')">
        <span class="icon">→</span>Right
      </button>
      <button class="quick-btn" onclick="sendSpecial('Home')">
        <span class="icon">⤒</span>Home
      </button>
      <button class="quick-btn" onclick="sendSpecial('End')">
        <span class="icon">⤓</span>End
      </button>
    </div>
  </div>

  <!-- Modifier Keys -->
  <div>
    <div class="section-label">Modifier Keys (Hold)</div>
    <div class="mod-grid">
      <button class="mod-btn" id="mod-Shift"   onclick="toggleModifier('Shift')">⇧ Shift</button>
      <button class="mod-btn" id="mod-Control" onclick="toggleModifier('Control')">Ctrl</button>
      <button class="mod-btn" id="mod-Alt"     onclick="toggleModifier('Alt')">Alt</button>
    </div>
  </div>

  <!-- Function Keys -->
  <div>
    <div class="section-label">Function Keys</div>
    <div class="fn-row">
      <button class="fn-btn" onclick="sendSpecial('F1')">F1</button>
      <button class="fn-btn" onclick="sendSpecial('F2')">F2</button>
      <button class="fn-btn" onclick="sendSpecial('F3')">F3</button>
      <button class="fn-btn" onclick="sendSpecial('F4')">F4</button>
      <button class="fn-btn" onclick="sendSpecial('F5')">F5</button>
      <button class="fn-btn" onclick="sendSpecial('F6')">F6</button>
      <button class="fn-btn" onclick="sendSpecial('F7')">F7</button>
      <button class="fn-btn" onclick="sendSpecial('F8')">F8</button>
      <button class="fn-btn" onclick="sendSpecial('F9')">F9</button>
      <button class="fn-btn" onclick="sendSpecial('F10')">F10</button>
      <button class="fn-btn" onclick="sendSpecial('F11')">F11</button>
      <button class="fn-btn" onclick="sendSpecial('F12')">F12</button>
    </div>
  </div>

  <footer>PhoneKey v1.0.0 — Lightweight &amp; Local</footer>

</div><!-- /#app -->

<script>
  "use strict";

  // ── Config ──────────────────────────────────────────────────────────────
  // Auto-detect the server IP (same host that served this HTML file)
  const WS_PORT = 8765;
  const WS_URL  = `ws://${location.hostname}:${WS_PORT}`;

  // Reconnect settings (exponential backoff)
  const RECONNECT_BASE_MS  = 1000;
  const RECONNECT_MAX_MS   = 16000;
  const RECONNECT_FACTOR   = 2;

  // ── State ───────────────────────────────────────────────────────────────
  let socket          = null;
  let reconnectDelay  = RECONNECT_BASE_MS;
  let reconnectTimer  = null;

  // Modifier key state map  { key: isHeld }
  const modifiers = { Shift: false, Control: false, Alt: false };

  // Sentinel textarea reference
  const sentinelEl  = document.getElementById("sentinel-input");
  const tapBtn      = document.getElementById("tap-to-type");
  const liveDisplay = document.getElementById("live-display");
  const statusBadge = document.getElementById("status-badge");
  const statusText  = document.getElementById("status-text");
  const statusDot   = document.getElementById("status-dot");

  // Sentinel value — we keep textarea always containing this string
  // so we can detect additions (char typed) or deletions (backspace)
  const SENTINEL = "\u200B"; // Zero-width space — invisible but present

  // ── WebSocket ────────────────────────────────────────────────────────────

  function connect() {
    setStatus("connecting", "Connecting…");
    socket = new WebSocket(WS_URL);

    socket.addEventListener("open", () => {
      reconnectDelay = RECONNECT_BASE_MS;
      setStatus("connected", "Connected ✓");
      clearTimeout(reconnectTimer);
    });

    socket.addEventListener("close", () => {
      setStatus("disconnected", "Reconnecting…");
      scheduleReconnect();
    });

    socket.addEventListener("error", () => {
      socket.close();
    });
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * RECONNECT_FACTOR, RECONNECT_MAX_MS);
      connect();
    }, reconnectDelay);
  }

  function setStatus(state, label) {
    statusBadge.className = state;
    statusText.textContent = label;
  }

  // ── Send helpers ─────────────────────────────────────────────────────────

  function sendPayload(payload) {
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send(JSON.stringify(payload));
    }
  }

  /**
   * Sends a regular character keypress.
   * Also applies any currently-held modifier keys.
   */
  function sendChar(char) {
    // Press active modifiers first
    Object.entries(modifiers).forEach(([mod, held]) => {
      if (held) sendPayload({ action: "keydown", key: mod });
    });

    sendPayload({ action: "keypress", key: char });

    // Release active modifiers and reset their toggle state
    Object.entries(modifiers).forEach(([mod, held]) => {
      if (held) {
        sendPayload({ action: "keyup", key: mod });
        modifiers[mod] = false;
        document.getElementById(`mod-${mod}`).classList.remove("active");
      }
    });

    // Update live preview
    appendToDisplay(char);
  }

  /**
   * Sends a special key (Enter, Backspace, arrow keys, etc.)
   */
  function sendSpecial(keyName) {
    sendPayload({ action: "keypress", key: keyName });

    // Update live preview for common specials
    if (keyName === "Backspace") {
      const text = liveDisplay.textContent;
      liveDisplay.textContent = text.slice(0, -1);
    } else if (keyName === "Enter") {
      appendToDisplay("↵\n");
    } else if (keyName === "Tab") {
      appendToDisplay("⇥");
    }

    flashDisplay();
  }

  // ── Sentinel Input Pattern ───────────────────────────────────────────────
  /**
   * THE KEY INNOVATION:
   *
   * Mobile browsers fire keydown with keyCode:229 for almost all keys,
   * making it useless. Instead we:
   *
   *   1. Keep a hidden <textarea> always containing SENTINEL char.
   *   2. On 'input' event, compare new value to SENTINEL.
   *   3. If value grew → new chars were typed → send them one by one.
   *   4. If value shrank (length 0) → Backspace was pressed.
   *   5. Immediately reset textarea back to SENTINEL.
   *
   * This gives us zero-duplication, zero-lag key capture.
   */

  sentinelEl.addEventListener("input", (e) => {
    const current = sentinelEl.value;

    if (current.length > SENTINEL.length) {
      // Characters were added after sentinel
      const typed = current.slice(SENTINEL.length);
      for (const ch of typed) {
        sendChar(ch);
      }
    } else if (current.length === 0 || current === "") {
      // Backspace deleted everything including sentinel
      sendSpecial("Backspace");
    }

    // Reset sentinel — always keep it as the base value
    sentinelEl.value = SENTINEL;
  });

  // Prevent cursor position from ever leaving sentinel position
  sentinelEl.addEventListener("keydown", (e) => {
    // Only intercept backspace via keydown on desktop fallback
    if (e.key === "Backspace" && sentinelEl.value === SENTINEL) {
      e.preventDefault();
      sendSpecial("Backspace");
    }
  });

  // Keep sentinel focused when active
  sentinelEl.addEventListener("blur", () => {
    tapBtn.classList.remove("active");
    tapBtn.textContent = "👆 Tap here to start typing";
  });

  sentinelEl.addEventListener("focus", () => {
    tapBtn.classList.add("active");
    tapBtn.textContent = "⌨️ Keyboard active — start typing";
    // Ensure sentinel value is set
    sentinelEl.value = SENTINEL;
  });

  function activateSentinel() {
    sentinelEl.focus();
    sentinelEl.value = SENTINEL;
    // Move cursor to end
    sentinelEl.setSelectionRange(SENTINEL.length, SENTINEL.length);
  }

  // ── Modifier Toggle ──────────────────────────────────────────────────────

  function toggleModifier(mod) {
    modifiers[mod] = !modifiers[mod];
    const btn = document.getElementById(`mod-${mod}`);
    btn.classList.toggle("active", modifiers[mod]);

    // Send keydown if activating, keyup if deactivating
    sendPayload({
      action: modifiers[mod] ? "keydown" : "keyup",
      key: mod
    });
  }

  // ── Live Display Helpers ─────────────────────────────────────────────────

  function appendToDisplay(text) {
    liveDisplay.textContent += text;
    flashDisplay();
    // Auto-scroll (won't grow past viewport; just a display)
    if (liveDisplay.textContent.length > 200) {
      liveDisplay.textContent = liveDisplay.textContent.slice(-200);
    }
  }

  function flashDisplay() {
    liveDisplay.classList.add("flash");
    setTimeout(() => liveDisplay.classList.remove("flash"), 150);
  }

  function clearDisplay() {
    liveDisplay.textContent = "";
  }

  // ── Page Visibility API — reconnect when tab becomes visible ─────────────
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && (!socket || socket.readyState !== WebSocket.OPEN)) {
      clearTimeout(reconnectTimer);
      reconnectDelay = RECONNECT_BASE_MS;
      connect();
    }
  });

  // ── Boot ─────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
